<!doctype html>
<!--
  EeveeAssist Chat Query Overlay
  ──────────────────────────────
  Add this as a second Browser Source in OBS (on top of the main spawn overlay).
  Size: 230 × 300 px recommended.

  Required URL parameter:
    ?server=https://your-railway-app.up.railway.app

  Example:
    file:///path/to/eeveeassist.html?server=https://eeveeassist.up.railway.app
    https://your-gh-pages.github.io/poke-community-overlay/eeveeassist.html?server=https://eeveeassist.up.railway.app
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>EeveeAssist Overlay</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        background: transparent;
        overflow: hidden;
      }

      #widget {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: fixed;
        top: 100px;
        left: 200px;
        width: 320px;
        padding: 8px 0 12px;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));

        /* hidden by default — JS toggles .visible */
        opacity: 0;
        transform: translateY(-12px);
        transition: opacity 0.4s ease, transform 0.4s ease;
        pointer-events: none;
      }

      #widget.visible {
        opacity: 1;
        transform: translateY(0);
      }

      #widget.hiding {
        opacity: 0;
        transform: translateY(-12px);
      }

      #label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.4px;
        margin-bottom: 4px;
        text-transform: uppercase;
        text-shadow: rgba(0, 0, 0, 0.8) 1px 1px 1px;
      }

      #artwork {
        width: 320px;
        height: 320px;
        object-fit: contain;
        image-rendering: auto;
        filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.6));
      }

      #pokemon-name {
        font-family: "Orbitron", sans-serif;
        font-size: 40px;
        font-weight: 700;
        color: rgb(106, 111, 252);
        text-align: center;
        text-transform: uppercase;
        text-shadow: rgba(0, 0, 0, 0.8) 1px 1px 1px;
        margin-top: 8px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="widget">
      <div id="label">Chat asked about</div>
      <img id="artwork" alt="" />
      <div id="pokemon-name"></div>
    </div>

    <script>
      const DISPLAY_MS  = 8000; // how long to show the image before fading out
      const ARTWORK_URL = id =>
        `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;

      const widget      = document.getElementById('widget');
      const artwork     = document.getElementById('artwork');
      const nameLabel   = document.getElementById('pokemon-name');

      let hideTimer = null;

      function showPokemon(id, name) {
        // Cancel any pending hide
        if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

        // Snap hide first if already visible so the new one animates in clean
        if (widget.classList.contains('visible')) {
          widget.classList.remove('visible');
          widget.classList.add('hiding');
          setTimeout(() => displayPokemon(id, name), 420);
        } else {
          displayPokemon(id, name);
        }
      }

      function displayPokemon(id, name) {
        artwork.src     = ARTWORK_URL(id);
        nameLabel.textContent = name;

        widget.classList.remove('hiding');
        // Force reflow so the transition fires
        void widget.offsetWidth;
        widget.classList.add('visible');

        hideTimer = setTimeout(() => {
          widget.classList.remove('visible');
          widget.classList.add('hiding');
          hideTimer = null;
        }, DISPLAY_MS);
      }

      // ── SSE connection ──────────────────────────────────────────────────────
      const serverUrl = new URLSearchParams(window.location.search).get('server') || '';

      if (!serverUrl) {
        console.warn('[EeveeAssist overlay] No ?server= param provided.');
      } else {
        function connect() {
          const es = new EventSource(`${serverUrl}/events`);

          es.onmessage = e => {
            try {
              const { id, name } = JSON.parse(e.data);
              showPokemon(id, name);
            } catch (err) {
              console.error('[EeveeAssist overlay] parse error:', err);
            }
          };

          es.onerror = () => {
            es.close();
            // EventSource auto-reconnects, but close + reopen for clean state
            setTimeout(connect, 5000);
          };
        }

        connect();
      }
    </script>
  </body>
</html>
